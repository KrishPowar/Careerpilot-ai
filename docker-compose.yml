services:
  backend:
    build:
      context: ./backend
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-too}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:5173}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-CareerPilot AI}
      DATABASE_PATH: /app/data/careerpilot.db
      UPLOAD_FOLDER: /app/uploads
      FRONTEND_ORIGIN: http://localhost:5173
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
